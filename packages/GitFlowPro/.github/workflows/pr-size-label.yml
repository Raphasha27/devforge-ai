name: PR Size Labeler

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  size-label:
    runs-on: ubuntu-latest
    steps:
      - uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: "size/xs"
          xs_max_size: "10"
          s_label: "size/s"
          s_max_size: "50"
          m_label: "size/m"
          m_max_size: "200"
          l_label: "size/l"
          l_max_size: "500"
          xl_label: "size/xl"
          message_if_xl: "⚠️ This PR is extremely large. Consider splitting it."
