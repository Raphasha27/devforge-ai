name: Publish Governance Dashboard

on:
  schedule:
    - cron: "0 7 * * 1" # weekly Monday 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    name: Build & Publish Dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build org governance report
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          ORG_NAME: ${{ secrets.ORG_NAME }}
        run: |
          python scripts/org_report_builder.py

      - name: Generate dashboard HTML
        run: |
          python scripts/dashboard_generator.py

      - name: Publish to GitHub Pages branch
        run: |
          git config user.name "gitflowpro-dashboard-bot"
          git config user.email "gitflowpro-dashboard-bot@users.noreply.github.com"
          git checkout -B gh-pages
          rm -rf *
          cp -r dashboard/* .
          touch .nojekyll
          git add .
          git commit -m "chore(dashboard): update governance dashboard" || exit 0
          git push -f origin gh-pages
