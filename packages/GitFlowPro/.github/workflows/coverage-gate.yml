name: Coverage Gate

on:
  pull_request:
    branches: [main]

jobs:
  coverage:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      issues: write
      contents: read

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Pytest Coverage (PR)
        run: |
          if [ -d "tests" ]; then
            pytest --cov=. --cov-report=json:coverage_pr.json
          else
            echo '{"totals":{"percent_covered":100}}' > coverage_pr.json
          fi

      - name: Save PR Coverage File
        run: |
          mkdir -p /tmp/repopilot
          cp coverage_pr.json /tmp/repopilot/coverage_pr.json

      - name: Fetch main branch
        run: |
          git fetch origin main:main

      - name: Checkout main branch
        run: |
          git checkout main

      - name: Install Dependencies (main)
        run: |
          pip install -r requirements.txt

      - name: Run Pytest Coverage (main)
        run: |
          if [ -d "tests" ]; then
            pytest --cov=. --cov-report=json:coverage_main.json
          else
            echo '{"totals":{"percent_covered":100}}' > coverage_main.json
          fi

      - name: Restore PR Coverage File
        run: |
          cp /tmp/repopilot/coverage_pr.json coverage_pr.json

      - name: Post Coverage Comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python scripts/post_coverage_comment.py

      - name: Compare Coverage (Fail if Drop)
        env:
          COVERAGE_DROP_ALLOWED: "0.0"
        run: |
          python scripts/coverage_gate.py
