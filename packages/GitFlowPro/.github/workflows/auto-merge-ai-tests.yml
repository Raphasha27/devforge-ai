name: Auto Merge AI Test PRs (Risk Gate)

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled]

jobs:
  automerge:
    if: |
      startsWith(github.head_ref, 'ai/tests/') &&
      contains(github.event.pull_request.labels.*.name, 'ai:reviewed') &&
      !contains(github.event.pull_request.labels.*.name, 'override:block') &&
      (
        contains(github.event.pull_request.labels.*.name, 'override:merge') ||
        (
          (
            contains(github.event.pull_request.labels.*.name, 'risk:low') ||
            contains(github.event.pull_request.labels.*.name, 'risk:medium')
          ) &&
          !contains(github.event.pull_request.labels.*.name, 'ai:block')
        )
      )
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Enable Auto Merge for AI Test PR
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.REPOPILOT_BOT_TOKEN }}
          pull-request-number: ${{ github.event.pull_request.number }}
          merge-method: squash
