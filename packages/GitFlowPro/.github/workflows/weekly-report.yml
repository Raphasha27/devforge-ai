name: Weekly Report

on:
  schedule:
    - cron: '0 9 * * 1' # Monday 09:00 UTC
  workflow_dispatch:

jobs:
  report:
    name: Generate Report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build CLI
        run: go build -o gitflow ./cmd/gitflow

      - name: Run Report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
        run: ./gitflow report
