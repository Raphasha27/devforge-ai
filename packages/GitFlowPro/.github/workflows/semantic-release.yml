name: Semantic Release

on:
  workflow_dispatch: # Only run manually or via API - prevents billing failures on every push
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'  # Only trigger on explicit version tags

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: Run Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
