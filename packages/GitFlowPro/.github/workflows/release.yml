name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Binaries
        run: |
          GOOS=windows GOARCH=amd64 go build -o gitflow-windows-amd64.exe ./cmd/gitflow
          GOOS=linux GOARCH=amd64 go build -o gitflow-linux-amd64 ./cmd/gitflow
          GOOS=darwin GOARCH=arm64 go build -o gitflow-macos-arm64 ./cmd/gitflow

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            gitflow-windows-amd64.exe
            gitflow-linux-amd64
            gitflow-macos-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
