name: PR Checks

on:
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Install Dependencies
        run: go mod download

      - name: Build
        run: go build -v ./cmd/gitflow

      - name: Run Tests
        run: go test -v ./...

      - name: Post PR Summary
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Use our own CLI if we wanted to, but for now just a summary
          echo "✅ Quality Gate Passed for GitFlowPro"
