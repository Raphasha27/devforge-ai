name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go-checks:
    name: Go Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Build CLI
        run: go build -v ./cmd/gitflow

      - name: Run Go Tests
        run: go test -v ./...

  python-checks:
    name: Python Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Ruff Lint
        run: |
          ruff check .

      - name: Run Black Format Check
        run: |
          black --check .

      - name: Run Pytest (if tests exist)
        run: |
          if [ -d "tests" ]; then pytest; else echo "No tests folder found"; fi

  node-checks:
    name: Node Checks (Optional)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: |
          if [ -f package.json ]; then npm install; else echo "No package.json found"; fi

      - name: Run Lint
        run: |
          if [ -f package.json ]; then npm run lint || true; fi

      - name: Run Tests
        run: |
          if [ -f package.json ]; then npm test || true; fi
