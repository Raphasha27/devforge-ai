name: Secret Scanning

on:
  schedule:
    - cron: '0 5 * * 1' # Only weekly on Monday - not on every push
  workflow_dispatch:

jobs:
  gitleaks:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    continue-on-error: true  # Never block main branch if billing is locked
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
